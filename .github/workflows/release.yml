name: Release

on:
  workflow_dispatch:

concurrency:
  group: 'release'
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # prepare: the single source of every version bump + changelog. Computes the
  # next semver, bumps package.json / android / whats-new, writes CHANGELOG.md,
  # makes ONE commit + annotated tag, and creates the GitHub Release. The three
  # platform jobs then check out that exact tag and are read-only.
  # ---------------------------------------------------------------------------
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Compute Semantic Version
        id: semver
        uses: paulhatch/semantic-version@502226b17e3e242e4befd0a45690fcbb27dd1373 # v6.0.3
        with:
          tag_prefix: 'v'
          version_format: '${major}.${minor}.${patch}'
          bump_each_commit: false
          major_pattern: 'BREAKING CHANGE'
          minor_pattern: 'feat'

      - name: Bump Versions
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version
          CUR=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
          CODE=$((CUR + 1))
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" android/app/build.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${CODE}/" android/app/build.gradle
          echo "Bumped to versionName=$VERSION versionCode=$CODE"

      - name: Update CHANGELOG
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: npx git-cliff@2 --output CHANGELOG.md --tag "v${VERSION}"

      - name: Stamp What's New
        env:
          VERSION: ${{ steps.semver.outputs.version }}
          VERSION_TYPE: ${{ steps.semver.outputs.version_type }}
        run: |
          ARGS=(--version "$VERSION" --date "$(date -u +%Y-%m-%d)")
          if [ "$VERSION_TYPE" = "major" ] || [ "$VERSION_TYPE" = "minor" ]; then
            ARGS+=(--require-entries)
          fi
          node scripts/stamp-whats-new.mjs "${ARGS[@]}"

      - name: Commit, Tag and Push
        env:
          VERSION: ${{ steps.semver.outputs.version }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json package-lock.json android/app/build.gradle CHANGELOG.md src/assets/whats-new.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push --follow-tags \
            "https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:main"

      - name: Generate Release Notes
        id: notes
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          {
            echo 'body<<CLIFF_EOF'
            npx git-cliff@2 --latest --strip all
            echo 'CLIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ steps.semver.outputs.version }}
          name: Release v${{ steps.semver.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Fan-out: each reusable workflow checks out tag v<version> ---
  web:
    needs: prepare
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}

  android:
    needs: prepare
    permissions:
      contents: write
    uses: ./.github/workflows/android.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}

  ios:
    needs: prepare
    permissions:
      contents: read
    uses: ./.github/workflows/ios.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
