name: Deploy Android

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (checks out tag v<version>)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty to bump from package.json)'
        required: false
        type: string

concurrency:
  group: 'android'
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build job: holds NO signing/deploy secrets. Runs the dependency code
  # (npm ci, cap sync, gradle) and produces UNSIGNED artifacts.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_PROTOMAPS_API_KEY: ${{ secrets.PROTOMAPS_API_KEY_ANDROID }}
      INPUT_VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web assets
        run: npm run buildAndSync

      - name: Resolve version
        id: version
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Called from release.yml (or dispatch with a version): the prepare
            # job already committed the version bump in tag v<version>.
            VERSION="$INPUT_VERSION"
            CODE=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
          else
            # Standalone hotfix dispatch: bump the build number here.
            VERSION=$(node -p "require('./package.json').version")
            CUR=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
            CODE=$((CUR + 1))
            sed -i -E "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" android/app/build.gradle
            sed -i -E "s/versionCode [0-9]+/versionCode ${CODE}/" android/app/build.gradle
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VERSION versionCode=$CODE"

      - name: Set Up JDK 21
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build Unsigned Release AAB
        working-directory: ./android
        run: ./gradlew bundleRelease

      - name: Build Unsigned Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload Unsigned AAB
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: release-aab
          path: ./android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: release-apk
          path: ./android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Deploy job: holds the signing keystore + Play credentials. Runs NO
  # dependency/build code; only signs the pre-built artifacts and uploads them.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.build.outputs.version }}
      VERSION_CODE: ${{ needs.build.outputs.version_code }}
      INPUT_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}
          persist-credentials: false

      - name: Download Unsigned AAB
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-aab
          path: artifacts/aab

      - name: Download Unsigned APK
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-apk
          path: artifacts/apk

      - name: Decode Keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: echo "$KEYSTORE_FILE" | tr -d '\n' | base64 --decode > keystore.jks

      - name: Sign AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner -keystore keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            artifacts/aab/app-release.aab "$KEY_ALIAS"

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"
          echo "Using build-tools: $BUILD_TOOLS"
          "$BUILD_TOOLS/zipalign" -f -v 4 \
            artifacts/apk/app-release-unsigned.apk aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "fireyak-v${VERSION}.apk" aligned.apk

      - name: Upload Signed APK to GitHub Release
        if: ${{ inputs.version != '' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ env.VERSION }}
          files: fireyak-v${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Play Credentials
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: printf '%s' "$PLAY_STORE_JSON_KEY" > play-credentials.json

      - name: Deploy to Google Play (internal)
        run: |
          bundle install
          bundle exec fastlane android internal aab:"$(pwd)/artifacts/aab/app-release.aab"

      - name: Commit Version Bump
        if: ${{ inputs.version == '' }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" android/app/build.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${VERSION_CODE}/" android/app/build.gradle
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add android/app/build.gradle
          git commit -m "chore: bump android version to ${VERSION} (${VERSION_CODE}) [skip ci]" \
            || { echo "No changes to commit"; exit 0; }
          git push "https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME}"
