name: Deploy Ios

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (checks out tag v<version>)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty to use current ref)'
        required: false
        type: string

concurrency:
  group: 'ios'
  cancel-in-progress: true

jobs:
  # xcodebuild needs match-provided signing during the archive step, so iOS
  # cannot use the build/sign split that Android does. It is hardened instead:
  # pinned actions, npm ci --ignore-scripts, no persisted credentials.
  deploy:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      VITE_PROTOMAPS_API_KEY: ${{ secrets.PROTOMAPS_API_KEY_IOS }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web assets
        run: npm run buildAndSync

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to TestFlight
        env:
          AUTHKEY_FILE: ${{ secrets.AUTHKEY_FILE }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          echo "$AUTHKEY_FILE" | base64 -d > authkey.json
          bundle install
          bundle exec fastlane ios beta
