# git-cliff configuration for FireYak
# Generates changelogs from conventional commits

[changelog]
header = "# Changelog\n\nAll notable changes to FireYak.\n"
trim = true

[git]
tag_pattern = "v[0-9]*"
sort_commits = "newest"
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Other" },
    { message = "^chore\\(release", skip = true },
    { message = "^chore: bump", skip = true },
    { message = "\\[skip ci\\]", skip = true },
]
